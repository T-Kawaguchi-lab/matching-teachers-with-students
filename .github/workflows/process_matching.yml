name: Process matching inputs and refresh Streamlit outputs

on:
  push:
    branches:
      - main
    paths:
      - 'incoming/teachers_latest.xlsx'
      - 'incoming/students_latest.xlsx'
      - 'data_sources/master_title.xlsx'
      - 'committee_matching/**'
      - 'app/**'
      - 'streamlit_app.py'
      - '.github/workflows/process_matching.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: process-matching-main
  cancel-in-progress: false

jobs:
  process:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify expected files
        run: |
          ls -la
          test -f incoming/students_latest.xlsx || echo "students_latest.xlsx not found"
          test -f incoming/teachers_latest.xlsx || echo "teachers_latest.xlsx not found"
          test -f data_sources/master_title.xlsx || echo "master_title.xlsx not found"

      - name: Run pipeline
        run: python -m committee_matching.pipeline

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated data_sources/master_title.xlsx
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update generated matching outputs"
            git push
          fi